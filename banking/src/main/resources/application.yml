spring:
  application:
    name: banking

  datasource:
    url: jdbc:postgresql://localhost:5432/banking
    username: postgres
    password: postgres

  flyway:
    enabled: true
    locations: classpath:db/migration

  mybatis:
    configuration:
      map-underscore-to-camel-case: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8080